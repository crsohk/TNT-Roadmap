<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-title" content="Roadmap" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2865/2865910.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="https://cdn-icons-png.flaticon.com/512/2865/2865910.png" />
    <link rel="manifest" href="./manifest.json" />
    <title>TNT: Rectal Cancer Treatment Roadmap</title>

        crossorigin="anonymous"></script>

    <style>
        :root {
            --nchm-clr: #2e7d32;
            --ccrt-clr: #007aff;
            --ctnt-clr: #5856d6;
            --itnt-clr: #ff9500;
            --apple-red: #ff3b30;
            --apple-bg: #faf8f2;
            --snubh-dark-green: #1b5e20;
            --element-bg: #f3f0e9;
            --interim-clr: #e67e22;
            --kakao-yellow: #FEE500;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
        }

        body {
            margin: 0;
            padding: 10px 15px;
            color: #1d1d1f;
            background-color: var(--apple-bg);
            -webkit-font-smoothing: antialiased;
        }

        #splash {
            position: fixed;
            inset: 0;
            background: var(--snubh-dark-green);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
            visibility: visible;
        }

        .splash-content {
            text-align: center;
            width: 90%;
        }

        .snubh-logo-img {
            width: 100%;
            max-width: 230px;
            background: rgba(255, 255, 255, 0.98);
            padding: 15px;
            border-radius: 12px;
        }

        .splash-sub {
            font-size: 20px;
            font-weight: 500;
            color: white;
            letter-spacing: 2px;
            margin-top: 25px;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .hide-splash {
            opacity: 0 !important;
            pointer-events: none !important;
            visibility: hidden !important;
        }

        .app-card {
            max-width: 480px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .header img {
            width: 120px;
            margin-bottom: 5px;
        }

        .header h1 {
            font-weight: 500;
            font-size: 18px;
            margin: 0;
            letter-spacing: -0.05em;
            color: #1d1d1f;
        }

        .tab-menu {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin-bottom: 12px;
            background: var(--element-bg);
            padding: 5px;
            border-radius: 14px;
        }

        .tab-btn {
            padding: 12px 0;
            border-radius: 10px;
            border: none;
            background: transparent;
            font-weight: 900;
            font-size: 13px;
            color: #86868b;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.12);
        }

        #btn-nchm.active { color: var(--nchm-clr); }
        #btn-ccrt.active { color: var(--ccrt-clr); }
        #btn-ctnt.active { color: var(--ctnt-clr); }
        #btn-itnt.active { color: var(--itnt-clr); }

        .input-container {
            background: var(--element-bg);
            border-radius: 18px;
            padding: 10px 20px;
            border: 1px solid #e1ddd3;
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 900;
            color: #86868b;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        input[type="date"] {
            border: none;
            width: 100%;
            font-size: 22px;
            font-weight: 900;
            background: transparent;
            outline: none;
            color: #000;
            letter-spacing: -0.03em;
        }

        .schedule-row {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.03);
        }

        .row-gauge {
            position: relative;
            width: 14px;
            height: 45px;
            flex-shrink: 0;
        }

        .row-bar {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--element-bg);
            border-radius: 2px;
            transform: translateX(-50%);
        }

        .row-dot {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background: white;
            border: 3px solid #e5e5e7;
            border-radius: 50%;
            z-index: 2;
            box-shadow: 0 0 0 2px var(--apple-bg);
        }

        .row-content {
            flex: 1;
            overflow: hidden;
        }

        .row-date {
            font-weight: 900;
            font-size: 19px;
            color: #000;
            line-height: 1.1;
            letter-spacing: -0.03em;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
        }

        .row-label {
            font-size: 15px;
            color: #636366;
            margin-top: 1px;
            font-weight: 700;
        }

        .day-tag {
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 4px;
            background: var(--element-bg);
            font-weight: 900;
            color: #86868b;
            margin-left: 3px;
        }

        .date-divider {
            color: #d1d1d6;
            margin: 0 4px;
        }

        .theme-nchm .row-dot { border-color: var(--nchm-clr); }
        .theme-ccrt .row-dot { border-color: var(--ccrt-clr); }
        .theme-ctnt .row-dot { border-color: var(--ctnt-clr); }
        .theme-itnt .row-dot { border-color: var(--itnt-clr); }

        .row-interim .row-date {
            color: var(--interim-clr);
        }

        .row-interim .row-dot {
            border-color: var(--interim-clr) !important;
        }

        .special .row-date {
            color: var(--apple-red);
        }

        .special .row-dot {
            border-color: var(--apple-red) !important;
            width: 14px;
            height: 14px;
        }

        #shareButton {
            margin-top: 15px;
            width: 100%;
            padding: 14px;
            background-color: var(--snubh-dark-green);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        #shareMenu {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        #shareMenu button,
        #shareMenu a {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px 10px;
            border-radius: 10px;
            border: none;
            background: #e9ecef;
            color: #000;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        #kakaoShare {
            background: var(--kakao-yellow) !important;
            color: #3A1D1D !important;
        }

        .footer-info {
            text-align: center;
            font-size: 11px;
            color: #86868b;
            margin-top: 20px;
            line-height: 1.4;
            padding-bottom: 20px;
        }
    </style>
</head>

        function parseLocalDate(value) {
            const [y, m, d] = value.split("-").map(Number);
            return new Date(y, m - 1, d, 12, 0, 0, 0);
        }

        function cloneDate(date) {
            return new Date(date.getTime());
        }

        function formatIsoLocal(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, "0");
            const d = String(date.getDate()).padStart(2, "0");
            return `${y}-${m}-${d}`;
        }

        function formatDisplayDate(date) {
            return `${date.getFullYear()}.${date.getMonth() + 1}.${date.getDate()}`;
        }

        function formatDayName(date) {
            return DAY_NAMES_KO[date.getDay()];
        }

        function formatDayNameEn(date) {
            return DAY_NAMES_EN[date.getDay()];
        }

        function addDays(date, days) {
            const result = cloneDate(date);
            result.setDate(result.getDate() + days);
            return result;
        }

        function isHoliday(date) {
            const iso = formatIsoLocal(date);
            return date.getDay() === 0 || date.getDay() === 6 || HOLIDAYS.has(iso);
        }

        function addWorkDays(start, days) {
            let d = cloneDate(start);
            let count = 0;

            while (count < days) {
                if (!isHoliday(d)) count++;
                if (count < days) d.setDate(d.getDate() + 1);
            }
            return d;
        }

        function findNextSpecificDay(baseDate, targetDay) {
            let d = cloneDate(baseDate);
            while (d.getDay() !== targetDay || isHoliday(d)) {
                d.setDate(d.getDate() + 1);
            }
            return d;
        }

        function findNextTwoOptions(baseDate, targetDays) {
            const results = [];
            let d = cloneDate(baseDate);

            while (results.length < 2) {
                if (targetDays.includes(d.getDay()) && !isHoliday(d)) {
                    results.push(cloneDate(d));
                }
                d.setDate(d.getDate() + 1);
            }

            return results;
        }

        function hideSplash() {
            document.getElementById("splash").classList.add("hide-splash");
        }

        function setMode(nextMode) {
            if (!VALID_MODES.has(nextMode)) nextMode = "nchm";

            mode = nextMode;
            document.body.className = "theme-" + nextMode;

            document.querySelectorAll(".tab-btn").forEach((btn) => btn.classList.remove("active"));
            const targetBtn = document.getElementById("btn-" + nextMode);
            if (targetBtn) targetBtn.classList.add("active");

            document.getElementById("dateLabel").innerText =
                nextMode === "itnt" || nextMode === "nchm"
                    ? "XELOX #1 Start Date"
                    : "CRT Start Date";

            calculate();
        }

        function buildScheduleNodes(base) {
            let nodes = [];

            if (mode === "nchm") {
                const x3End = addDays(base, 63);
                const xEnd = addDays(base, 105);
                const wuDate = findNextSpecificDay(addDays(xEnd, 14), 4);

                nodes = [
                    { l: "Start of XELOX #1", d: base },
                    { l: "End of XELOX #3 & Interim CT", d: x3End, i: true },
                    { l: "End of XELOX #5", d: xEnd },
                    { l: "Restaging W/U", d: wuDate }
                ];
            } else if (mode === "itnt") {
                const x3End = addDays(base, 63);
                const rtStart = addDays(x3End, 14);
                const rtEnd = addWorkDays(rtStart, 25);
                const x4Start = addDays(rtEnd, 14);
                const x5End = addDays(x4Start, 42);
                const wuDate = findNextSpecificDay(addDays(rtEnd, 56), 4);

                nodes = [
                    { l: "Start of XELOX #1", d: base },
                    { l: "End of XELOX #3 & Interim CT", d: x3End, i: true },
                    { l: "Start of CCRT (2wk rest)", d: rtStart },
                    { l: "End of CCRT", d: rtEnd },
                    { l: "Start of XELOX #4 (2wk rest)", d: x4Start },
                    { l: "End of XELOX #5", d: x5End },
                    { l: "Restaging W/U (RT End + 8wk)", d: wuDate }
                ];
            } else if (mode === "ctnt") {
                const rtEnd = addWorkDays(base, 25);
                const x1Start = addDays(rtEnd, 14);
                const xEnd = addDays(x1Start, 84);
                const wuDate = findNextSpecificDay(addDays(rtEnd, 56), 4);

                nodes = [
                    { l: "Start of CRT", d: base },
                    { l: "End of CRT", d: rtEnd },
                    { l: "Start of XELOX #1 (2wk rest)", d: x1Start },
                    { l: "End of XELOX #4", d: xEnd },
                    { l: "Restaging W/U (RT End + 8wk)", d: wuDate }
                ];
            } else if (mode === "ccrt") {
                const rtEnd = addWorkDays(base, 25);
                const wuDate = findNextSpecificDay(addDays(rtEnd, 56), 4);

                nodes = [
                    { l: "Start of CRT", d: base },
                    { l: "End of CRT", d: rtEnd },
                    { l: "Restaging W/U", d: wuDate }
                ];
            }

            const lastWu = nodes[nodes.length - 1].d;

            nodes.push({
                l: "Surgery OPD Visit (M/Th)",
                d: findNextTwoOptions(addDays(lastWu, 4), [1, 4]),
                m: true
            });

            nodes.push({
                l: "Scheduled Surgery (W/F)",
                d: findNextTwoOptions(addDays(lastWu, 11), [3, 5]),
                m: true,
                s: true
            });

            return nodes;
        }

        function buildShareText(nodes) {
            const lines = [];
            lines.push("Rectal Cancer Treatment Roadmap");
            lines.push("");

            nodes.forEach((node) => {
                if (Array.isArray(node.d)) {
                    lines.push(
                        `- ${formatDisplayDate(node.d[0])} (${formatDayNameEn(node.d[0])}) / ${formatDisplayDate(node.d[1])} (${formatDayNameEn(node.d[1])}): ${node.l}`
                    );
                } else {
                    lines.push(
                        `- ${formatDisplayDate(node.d)} (${formatDayNameEn(node.d)}): ${node.l}`
                    );
                }
            });

            return lines.join("\n");
        }

        function renderSchedule(nodes) {
            const listContainer = document.getElementById("schedule-list");
            listContainer.innerHTML = "";

            nodes.forEach((node) => {
                const dateHtml = node.m
                    ? `<span class="date-item">${formatDisplayDate(node.d[0])}<span class="day-tag">${formatDayName(node.d[0])}</span></span><span class="date-divider">|</span><span class="date-item">${formatDisplayDate(node.d[1])}<span class="day-tag">${formatDayName(node.d[1])}</span></span>`
                    : `<span class="date-item">${formatDisplayDate(node.d)}<span class="day-tag">${formatDayName(node.d)}</span></span>`;

                const row = document.createElement("div");
                row.className = `schedule-row ${node.s ? "special" : ""} ${node.i ? "row-interim" : ""}`;
                row.innerHTML = `
                    <div class="row-gauge">
                        <div class="row-bar"></div>
                        <div class="row-dot"></div>
                    </div>
                    <div class="row-content">
                        <div class="row-date">${dateHtml}</div>
                        <div class="row-label">${node.l}</div>
                    </div>
                `;
                listContainer.appendChild(row);
            });
        }

        function updateShareLinks() {
            const smsLink = document.getElementById("smsShare");
            const mailLink = document.getElementById("mailShare");
            const encodedBody = encodeURIComponent(currentShareText);
            const encodedSubject = encodeURIComponent("Rectal Cancer Treatment Roadmap");
            smsLink.href = `sms:?body=${encodedBody}`;
            mailLink.href = `mailto:?subject=${encodedSubject}&body=${encodedBody}`;
        }

        function toggleShareMenu() {
            const menu = document.getElementById("shareMenu");
            menu.style.display = menu.style.display === "grid" ? "none" : "grid";
        }

        function shareKakao() {
            if (!currentShareText) {
                alert("먼저 날짜를 입력하여 스케줄을 계산해 주세요.");
                return;
            }
            Kakao.Share.sendDefault({
                objectType: "text",
                text: currentShareText,
                link: {
                    mobileWebUrl: window.location.href,
                    webUrl: window.location.href
                }
            });
        }

        async function copySchedule() {
            if (!currentShareText) {
                alert("먼저 날짜를 입력하여 스케줄을 계산해 주세요.");
                return;
            }

            try {
                await navigator.clipboard.writeText(currentShareText);
                alert("일정이 복사되었습니다.");
            } catch (error) {
                const textarea = document.createElement("textarea");
                textarea.value = currentShareText;
                textarea.style.position = "fixed";
                textarea.style.left = "-9999px";
                document.body.appendChild(textarea);
                textarea.focus();
                textarea.select();
                document.execCommand("copy");
                document.body.removeChild(textarea);
                alert("일정이 복사되었습니다.");
            }
        }

        function calculate() {
            const baseInput = document.getElementById("baseDate").value;
            const listContainer = document.getElementById("schedule-list");
            const shareButton = document.getElementById("shareButton");
            const shareMenu = document.getElementById("shareMenu");

            if (!baseInput) {
                listContainer.innerHTML = "";
                shareButton.style.display = "none";
                shareMenu.style.display = "none";
                currentShareText = "";
                return;
            }

            const base = parseLocalDate(baseInput);
            const nodes = buildScheduleNodes(base);

            currentShareText = buildShareText(nodes);
            renderSchedule(nodes);
            updateShareLinks();

            shareButton.style.display = "flex";
            shareMenu.style.display = "none";
        }

        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const modeParam = urlParams.get("mode");
            if (modeParam) setMode(modeParam);
        });

        window.addEventListener("load", () => {
            if ("serviceWorker" in navigator) {
                navigator.serviceWorker
                    .register("./sw.js")
                    .then(() => console.log("Roadmap PWA 등록 완료"))
                    .catch((err) => console.log("PWA 등록 실패", err));
            }

            setTimeout(hideSplash, 2500);
        });
    </script>
</body>
</html>
